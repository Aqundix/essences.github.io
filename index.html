<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="blue-header">
            <h2>Profile</h2>
        </header>

        <main class="content">
            <section class="profile-header">
                <div class="profile-circle" onclick="document.getElementById('file-input').click()">
                    <img id="profile-img" src="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <span id="profile-placeholder">Profile</span>
                    <div class="edit-overlay">แก้ไข</div>
                </div>
                <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)" style="display: none;">
                
                <div class="profile-text">
                    <h1 id="display-name">Name</h1>
                    <p id="display-bio">Description & Bio</p>
                </div>
            </section>

            <section class="edit-form">
                <label>ชื่อเล่น:</label>
                <input type="text" id="input-name" placeholder="ระบุชื่อของคุณ...">
                
                <label>คำอธิบาย:</label>
                <textarea id="input-bio" placeholder="ระบุคำอธิบายโปรไฟล์..."></textarea>
                
                <button class="save-btn" onclick="saveProfile()">บันทึกข้อมูล</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
