<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Full-Screen Profile Customizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container" id="main-app">
        <div id="view-profile" class="view active">
            <div class="header-banner" id="display-banner"></div>
            
            <div class="bottom-gradient-overlay"></div>

            <div class="profile-content">
                <div class="profile-avatar-wrapper">
                    <img id="display-avatar" src="" alt="avatar">
                </div>
                <div class="profile-details">
                    <h1 id="text-name">Username</h1>
                    <p id="text-bio">Welcome to my custom profile.</p>
                </div>

                <div id="display-socials" class="social-grid"></div>

                <button class="btn-edit-trigger" onclick="prepareEditView()">
                    <i class="fa-solid fa-pen-to-square"></i> Customize Profile
                </button>
                
            </div>

            <footer class="profile-footer">
                <div class="footer-links">
                    <span>Privacy</span>
                    <span>Security</span>
                    <span>Status</span>
                    <span>Community</span>
                </div>
                <p>Do not share my personal information</p>
                <p>&copy; 2026 Aqundix, Inc.</p>
            </footer>
        </div>

        <div id="view-edit" class="view">
    <div class="edit-header">
        <button class="btn-back" onclick="switchView('view-profile')">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        <h2>Customize & Edit</h2>
    </div>

    <div class="edit-container">
        <div class="edit-media-grid">
            <div class="media-box" onclick="document.getElementById('input-banner').click()">
                <i class="fa-solid fa-image"></i> Change Cover
                <input type="file" id="input-banner" hidden accept="image/*" onchange="previewMedia(this, 'display-banner')">
            </div>
            <div class="media-box" onclick="document.getElementById('input-avatar').click()">
                <i class="fa-solid fa-user"></i> Change Avatar
                <input type="file" id="input-avatar" hidden accept="image/*" onchange="previewMedia(this, 'display-avatar')">
            </div>
        </div>

        <div class="input-field">
            <label>Display Name</label>
            <input type="text" id="edit-name" placeholder="Specify the name you want to display...">
        </div>

        <div class="input-field">
            <label>Bio (Max 250)</label>
            <textarea id="edit-bio" maxlength="250" oninput="updateCount()" placeholder="Write a short self-introduction..."></textarea>
            <small id="char-count">0 / 250</small>
        </div>

        <div class="input-field">
            <label>Social Connections</label>
            <div id="edit-social-list"></div>
            <div class="add-social-controls">
                <select id="select-platform">
                    <option value="Instagram">Instagram</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Discord">Discord</option>
                    <option value="Facebook">Facebook</option>
                    <option value="Youtube">YouTube</option>
                    <option value="Github">GitHub</option>
                    <option value="Link">Other Link</option>
                </select>
                <button class="btn-add" onclick="addNewSocial()">Add</button>
            </div>
        </div>

        <div class="edit-actions">
            <button class="btn-reset-data" onclick="resetAllData()">
                <i class="fa-solid fa-trash-can"></i> Reset
            </button>
            <button class="btn-save-final" onclick="saveAll()">Save Changes</button>
        </div>
    </div>
</div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
