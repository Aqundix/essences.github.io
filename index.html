<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqundix | Elite Luxury Tech</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body>
    <img src="images/logo.png" alt="โลโก้เว็บไซต์">
    
    <div class="bg-glow-container">
        <div class="glow-sphere gold"></div>
        <div class="glow-sphere purple"></div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>

    <nav class="navbar">
        <div class="logo">AQUNDIX<span>.</span></div>

    </nav>

    <header class="hero">
        <div class="hero-content">
            <div class="badge reveal">
                <span class="badge-dot"></span> New Evolution in AI
            </div>
            <h1 class="hero-title reveal">
                AQUNDIX <br>
                <span class="mixed-gradient">FUTURE ELITE</span>
            </h1>
            <p class="hero-subtitle reveal">
                นิยามใหม่ของความหรูหราที่ผสานเข้ากับเทคโนโลยีอัจฉริยะ 
                สร้างสรรค์ประสบการณ์ที่ดุดัน ทรงพลัง และพรีเมียมที่สุดในยุคดิจิทัล
            </p>
            <div class="cta-container reveal">
                <a href="pages/about.html" class="btn-gold-main">Get Started</a>
                <a class="btn-glass-purple">View Technology</a>
            </div>
        </div>

        <div class="hero-visual reveal desktop-only">
            <div class="abstract-shape">
                <div class="glass-inner-card">
                    <div class="status-row">
                        <span class="status-label">System Active</span>
                        <span class="status-value gold-text">99.9%</span>
                    </div>
                    <div class="mini-graph">
                        <div class="bar p1"></div>
                        <div class="bar p2"></div>
                        <div class="bar p3"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <footer class="footer reveal">
        <div class="footer-content">
            <div class="footer-logo">AQUNDIX<span>.</span></div>
            <div class="social-links">
                <a href="##" class="social-icon">FB</a>
                <a href="##" class="social-icon">IG</a>
                <a href="##" class="social-icon">X</a>
                <a href="##" class="social-icon">LN</a>
            </div>
            <p class="copyright">© 2026 AQUNDIX LUXURY TECH. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script>
        // 1. Navigation Logic
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const closeBtn = document.getElementById('closeBtn');

        const toggleMenu = (isActive) => {
            navMenu.classList.toggle('active', isActive);
            menuOverlay.classList.toggle('active', isActive);
            document.body.style.overflow = isActive ? 'hidden' : 'auto';
        };

        hamburger.addEventListener('click', () => toggleMenu(true));
        closeBtn.addEventListener('click', () => toggleMenu(false));
        menuOverlay.addEventListener('click', () => toggleMenu(false));
    </script>
</body>
</html>
