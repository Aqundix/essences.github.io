<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Member List</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/list-profile.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h2>Member Directory DEKCOM 68</h2>
            <p style="color: #b9bbbe;">ศูนย์รวมเด็กคอม 1/2 ก.3</p>
        </div>

        <div id="member-list"></div>

        <div class="reset-container">
            <button class="reset-btn" onclick="openAuthModal()">
                รีเซ็ตข้อมูลทั้งหมด (Reset All Data)
            </button>
        </div>
    </div>

    <div id="adminAuthModal" class="auth-modal">
        <div class="auth-modal-content">
            <h3>Admin Access</h3>
            <p>กรุณากรอกรหัสผ่านเพื่อรีเซ็ตระบบ</p>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <div class="auth-actions">
                <button class="auth-cancel" onclick="closeAuthModal()">ยกเลิก</button>
                <button class="auth-confirm" onclick="verifyAndReset()">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script type="module" src="script/list-profile.js"></script>
</body>
</html>
