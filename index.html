<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with Google</title>
    <link rel="stylesheet" href="style-login.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google Logo">
            <h2>ยินดีต้อนรับ</h2>
            <p id="statusText">กรุณาเข้าสู่ระบบด้วยบัญชี Google ของคุณ</p>
            
            <button id="googleLoginBtn" class="google-btn">
                <span id="btnText">Sign in with Google</span>
            </button>

            <button id="logoutBtn" class="google-btn" style="display: none; background-color: #ff4757; color: white; border: none; margin-top: 10px;">
                <span>ออกจากระบบ (Log Out)</span>
            </button>
            
            <p id="errorMsg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <script type="module" src="script-login.js"></script>
</body>
</html>
