<!DOCTYPE html>
<html>
<head>
    <title>Firebase Auth on GitHub Pages</title>
</head>
<body>
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="btnLogin">Sign In</button>
    <button id="btnRegister">Register</button>

    <hr>
    <h2>Save Data</h2>
    <input type="text" id="userData" placeholder="พิมพ์ข้อความที่ต้องการบันทึก">
    <button id="btnSave">Save to Firestore</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // คัดลอกค่าจาก Firebase Console มาวางตรงนี้
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ระบบสมัครสมาชิก ---
        document.getElementById('btnRegister').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("สมัครสมาชิกสำเร็จ!");
            } catch (error) {
                alert(error.message);
            }
        };

        // --- ระบบ Login ---
        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("เข้าสู่ระบบแล้ว!");
            } catch (error) {
                alert(error.message);
            }
        };

        // --- ระบบเก็บข้อมูล (Firestore) ---
        document.getElementById('btnSave').onclick = async () => {
            const user = auth.currentUser;
            if (user) {
                const text = document.getElementById('userData').value;
                try {
                    // เก็บข้อมูลโดยใช้ UID ของผู้ใช้เป็นชื่อ Document
                    await setDoc(doc(db, "users_info", user.uid), {
                        content: text,
                        email: user.email,
                        timestamp: new Date()
                    });
                    alert("บันทึกข้อมูลสำเร็จ!");
                } catch (e) {
                    alert("เกิดข้อผิดพลาด: " + e.message);
                }
            } else {
                alert("กรุณา Login ก่อนบันทึกข้อมูล");
            }
        };
    </script>
</body>
</html>
