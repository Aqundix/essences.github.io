<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-card">
        <div id="view-profile" class="view active">
            <div class="header-banner" id="display-banner"></div>
            <div class="profile-content">
                <div class="profile-avatar-wrapper">
                    <img id="display-avatar" src="https://via.placeholder.com/150" alt="avatar">
                </div>
                <div class="profile-details">
                    <h1 id="text-name">Your Name</h1>
                    <p id="text-bio">Your premium bio description goes here. Welcome to my profile!</p>
                </div>
                <div class="social-pills">
                    <div class="pill">Instagram</div>
                    <div class="pill">Discord</div>
                </div>
                <button class="btn-primary" onclick="switchView('view-edit')">Edit Profile</button>
            </div>
        </div>

        <div id="view-edit" class="view">
            <div class="edit-header">
                <button class="btn-back" onclick="switchView('view-profile')">← Back</button>
                <h2>Edit Profile</h2>
            </div>
            
            <div class="edit-scroll-area">
                <div class="edit-media">
                    <div class="input-group-media" onclick="document.getElementById('input-banner').click()">
                        <span>Change Cover (.gif)</span>
                        <input type="file" id="input-banner" hidden accept="image/*" onchange="previewMedia(this, 'display-banner')">
                    </div>
                    <div class="input-group-media" onclick="document.getElementById('input-avatar').click()">
                        <span>Change Profile (.gif)</span>
                        <input type="file" id="input-avatar" hidden accept="image/*" onchange="previewMedia(this, 'display-avatar')">
                    </div>
                </div>

                <div class="input-field">
                    <label>Display Name</label>
                    <input type="text" id="edit-name" placeholder="Enter name...">
                </div>

                <div class="input-field">
                    <label>Bio (Max 250)</label>
                    <textarea id="edit-bio" maxlength="250" placeholder="Tell your story..." oninput="updateCount()"></textarea>
                    <small id="char-count">0 / 250</small>
                </div>

                <button class="btn-save" onclick="saveAll()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
