<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Profile - Dekcom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white min-h-screen font-sans">

    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
        <button class="text-2xl focus:outline-none">
            <i class="fas fa-bars"></i>
        </button>

        <div class="text-center">
            <p class="text-xs text-gray-400 uppercase tracking-widest">list profile</p>
            <h1 class="text-lg font-bold">List Member Dekcom</h1>
        </div>

        <div class="w-10 h-10 bg-cyan-400 rounded-full flex items-center justify-center overflow-hidden border-2 border-gray-700">
            <img src="https://via.placeholder.com/40" alt="Profile" class="hidden">
            <span class="text-black font-bold">P</span> 
        </div>
    </header>

    <main class="flex flex-col items-center mt-12 px-6">
        
        <button class="bg-[#4ade80] hover:bg-green-500 text-black font-bold py-2 px-6 rounded-sm shadow-lg transition duration-300">
            Create a Profile
        </button>

        <div class="mt-10 text-gray-600">
            <p>No profiles found. Click the button above to start.</p>
        </div>
        
    </main>

</body>
</html>
