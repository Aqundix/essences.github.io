<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval - Discord Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-card { transition: all 0.3s ease; }
        .profile-card:hover { transform: translateY(-5px); }
        #previewAvatar { object-fit: cover; }
    </style>
</head>
<body class="bg-[#313338] text-[#dbdee1] font-sans">

    <div class="container mx-auto max-w-4xl py-10 px-4">
        <div class="flex justify-between items-center mb-8 border-b border-[#3f4147] pb-4">
            <h1 class="text-2xl font-bold text-white flex items-center">
                <i class="fas fa-user-shield mr-3 text-[#5865f2]"></i>
                การอนุมัติโปรไฟล์ (Admin)
            </h1>
            <span id="requestCount" class="bg-[#2b2d31] px-4 py-1 rounded-full text-sm text-[#b5bac1]">0 รายการค้างอยู่</span>
        </div>

        <div id="approvalList" class="grid gap-6">
            <div class="text-center py-20 text-[#b5bac1]">
                <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                <p>กำลังดึงข้อมูลรายการที่รอการตรวจสอบ...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXf1-WXXaPd_IModQCb0I8NwvsZ1rgJWU",
            authDomain: "aqundix-d3f38.firebaseapp.com",
            projectId: "aqundix-d3f38",
            storageBucket: "aqundix-d3f38.firebasestorage.app",
            messagingSenderId: "923430604932",
            appId: "1:923430604932:web:cc2985eaa5125dc9ef72d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const listDiv = document.getElementById('approvalList');
        const countSpan = document.getElementById('requestCount');

        // ฟังก์ชันโหลดข้อมูล
        async function loadPendingProfiles() {
            try {
                const q = query(collection(db, "pending_approvals"), orderBy("submittedAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                listDiv.innerHTML = "";
                countSpan.innerText = `${querySnapshot.size} รายการค้างอยู่`;

                if (querySnapshot.empty) {
                    listDiv.innerHTML = `<div class="text-center py-20 bg-[#2b2d31] rounded-lg border-2 border-dashed border-[#3f4147]">
                        <i class="fas fa-check-circle text-4xl text-[#23a559] mb-4"></i>
                        <p class="text-white font-medium">ไม่มีคำขอที่ค้างอยู่</p>
                    </div>`;
                    return;
                }

                querySnapshot.forEach((document) => {
                    const data = document.data();
                    const docId = document.id;

                    const card = `
                        <div class="profile-card bg-[#2b2d31] rounded-xl overflow-hidden shadow-lg border border-[#3f4147] flex flex-col md:flex-row">
                            <div class="md:w-1/3 bg-[#1e1f22] p-6 flex flex-col items-center justify-center border-r border-[#3f4147]">
                                <div class="relative mb-3">
                                    <img src="${data.photoURL || 'https://img.icons8.com/bubbles/200/user.png'}" class="w-24 h-24 rounded-full border-4 border-[#313338]">
                                    <div class="absolute bottom-1 right-1 w-6 h-6 bg-[#23a559] border-4 border-[#1e1f22] rounded-full"></div>
                                </div>
                                <h2 class="text-white font-bold text-center">${data.displayName}</h2>
                                <p class="text-xs text-[#b5bac1]">UID: ${data.uid.substring(0, 10)}...</p>
                            </div>

                            <div class="md:w-2/3 p-6 flex flex-col justify-between">
                                <div>
                                    <label class="text-[10px] font-bold text-[#b5bac1] uppercase">About Me</label>
                                    <p class="text-sm text-[#dbdee1] bg-[#1e1f22] p-3 rounded mt-1 mb-4 border border-[#383a40]">
                                        ${data.bio || 'ไม่มีคำแนะนำตัว'}
                                    </p>
                                    <p class="text-[11px] text-[#949ba4]">ส่งเมื่อ: ${new Date(data.submittedAt).toLocaleString('th-TH')}</p>
                                </div>

                                <div class="flex gap-3 mt-6">
                                    <button onclick="approveProfile('${docId}', ${JSON.stringify(data).replace(/"/g, '&quot;')})" 
                                        class="flex-1 bg-[#23a559] hover:bg-[#1a7a42] text-white py-2 rounded font-bold transition">
                                        <i class="fas fa-check mr-2"></i> อนุมัติ
                                    </button>
                                    <button onclick="rejectProfile('${docId}')" 
                                        class="bg-[#da373c] hover:bg-[#a92b2f] text-white px-4 py-2 rounded font-bold transition">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    listDiv.innerHTML += card;
                });
            } catch (err) {
                listDiv.innerHTML = `<p class="text-red-400">Error: ${err.message}</p>`;
            }
        }

        // ฟังก์ชันอนุมัติ (ย้ายข้อมูล)
        window.approveProfile = async (id, data) => {
            if(!confirm("ยืนยันการอนุมัติและเผยแพร่โปรไฟล์นี้?")) return;
            
            try {
                // 1. ย้ายข้อมูลลง profiles จริง
                await setDoc(doc(db, "profiles", data.uid), {
                    uid: data.uid,
                    email: data.email,
                    displayName: data.displayName,
                    bio: data.bio,
                    photoURL: data.photoURL,
                    banner: data.banner,
                    updatedAt: new Date().toISOString()
                }, { merge: true });

                // 2. ลบออกจากคิวรออนุมัติ
                await deleteDoc(doc(db, "pending_approvals", id));
                
                alert("อนุมัติสำเร็จ!");
                loadPendingProfiles();
            } catch (err) {
                alert("อนุมัติล้มเหลว: " + err.message);
            }
        };

        // ฟังก์ชันปฏิเสธ
        window.rejectProfile = async (id) => {
            if(!confirm("คุณต้องการลบคำขอนี้ทิ้งใช่หรือไม่? (จะไม่เกิดการเปลี่ยนแปลงใดๆ ในโปรไฟล์ผู้ใช้)")) return;
            
            try {
                await deleteDoc(doc(db, "pending_approvals", id));
                alert("ลบคำขอแล้ว");
                loadPendingProfiles();
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            }
        };

        loadPendingProfiles();
    </script>
</body>
</html>
