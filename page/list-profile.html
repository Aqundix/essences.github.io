<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Profile - Dekcom✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/Center.jpg">
    <style>
        /* 1. จัดการพื้นหลังวิดีโอ */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #1e1f22;
        }

        #bgVideo {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4); 
        }

        body {
            background-color: transparent !important;
        }

        header {
            background-color: rgba(30, 31, 34, 0.8) !important;
            backdrop-filter: blur(10px);
        }
        
        #sidebar {
            background-color: #2b2d31;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animation สำหรับแจ้งเตือน */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-noti {
            animation: fadeInScale 0.2s ease-out;
        }

        /* สไตล์ Custom สำหรับ Scrollbar แจ้งเตือน */
        #notiList::-webkit-scrollbar { width: 4px; }
        #notiList::-webkit-scrollbar-thumb { background: #4e5058; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-white min-h-screen font-sans overflow-x-hidden">
    
    <div id="loadingScreen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-black transition-opacity duration-500">
        <div class="relative">
            <div class="w-16 h-16 border-4 border-green-500/20 border-t-green-500 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-8 h-8 bg-green-500 rounded-full animate-pulse shadow-[0_0_20px_rgba(74,222,128,0.5)]"></div>
            </div>
        </div>
        <p class="mt-6 text-xs uppercase tracking-[0.3em] text-gray-400">Loading Member Data</p>
    </div>
    
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 z-50 transform -translate-x-full border-r border-gray-800">
        <div class="p-5 flex flex-col h-full">
            <button id="closeMenu" class="self-end text-gray-400 hover:text-white mb-8"><i class="fas fa-times text-2xl"></i></button>
            <nav class="flex flex-col h-full gap-4">
                <a href="#" class="flex items-center gap-4 text-lg hover:text-green-400 transition"><i class="fas fa-home w-6"></i> Home</a>
                <a href="admin-approval.html" id="adminSidebarLink" class="hidden flex items-center gap-4 text-lg text-orange-400 hover:text-orange-300 transition font-bold">
                    <i class="fas fa-user-shield w-6"></i> Admin Panel
                </a>
                <a href="edit-profile.html" class="flex items-center gap-4 text-lg hover:text-green-400 transition"><i class="fas fa-user-circle w-6"></i> Settings</a>
                <div class="mt-auto border-t border-gray-800 pt-4">
                    <button id="logoutBtn" class="flex items-center gap-4 text-lg text-red-500 hover:text-red-400 w-full text-left font-bold">
                        <i class="fas fa-sign-out-alt w-6"></i> Log out
                    </button>
                </div>
            </nav>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <header class="relative flex items-center justify-between px-4 py-3 border-b border-gray-800 sticky top-0 z-30 min-h-[64px]">
        <div class="z-10">
            <button id="openMenu" class="text-2xl hover:text-gray-400"><i class="fas fa-bars"></i></button>
        </div>

        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em]">list profile</p>
            <h1 class="text-lg font-bold text-white">List Member Dekcom</h1>
        </div>

        <div class="flex items-center gap-4 z-10">
            <div class="relative cursor-pointer p-2" id="notiBell">
                <i class="fas fa-bell text-xl text-gray-400 hover:text-white transition-colors"></i>
                <span id="notiBadge" class="hidden absolute top-1 right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full min-w-[16px] h-[16px] flex items-center justify-center border-2 border-[#1e1f22]">
                    0
                </span>
            </div>

            <div id="headerUserIcon" class="w-10 h-10 bg-gray-800 rounded-full border-2 border-gray-700 overflow-hidden flex items-center justify-center">
                <i class="fas fa-user text-gray-600"></i>
            </div>
        </div>

        <div id="notiBox" class="hidden absolute top-16 right-4 w-72 bg-[#1e1f22] border border-white/10 rounded-xl shadow-2xl overflow-hidden z-[100] animate-noti">
            <div class="p-3 border-b border-white/5 bg-[#2b2d31] flex justify-between items-center">
                <h3 class="text-xs font-bold uppercase tracking-wider text-gray-300">Notifications</h3>
            </div>
            <div id="notiList" class="max-h-80 overflow-y-auto bg-[#1e1f22]">
                <div class="p-4 text-center text-gray-500 text-[11px]">ไม่มีการแจ้งเตือน</div>
            </div>
        </div>
    </header>
    
    <main class="flex flex-col items-center mt-12 px-6 w-full max-w-4xl mx-auto">
        <div id="userProfileCardContainer" class="w-full hidden"></div> 
        <div id="noProfileText" class="mt-10 text-gray-600 hidden">ไม่พบข้อมูลสมาชิก</div>
    </main>

    <div id="profileModal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="modalOverlay"></div>
        <div class="relative w-full max-w-[340px] bg-[#111214] rounded-2xl overflow-hidden shadow-2xl border border-white/10" id="modalContent" style="opacity: 0; transform: scale(0.9) translateY(20px);">
            <div id="modalBanner" class="h-[105px] bg-[#5865f2] relative"></div>
            <div class="px-4 pb-5 relative">
                <div class="relative -mt-12 mb-3 inline-block">
                    <div class="w-24 h-24 rounded-full bg-[#111214] p-1.5">
                        <img id="modalAvatar" src="" class="w-full h-full rounded-full object-cover bg-[#2b2d31]">
                    </div>
                    <div class="absolute bottom-2 right-2 w-6 h-6 bg-[#23a559] border-4 border-[#111214] rounded-full"></div>
                </div>
                <div class="bg-[#1e1f22] rounded-lg p-3 border border-[#2b2d31]">
                    <h3 id="modalName" class="text-xl font-bold text-white tracking-tight">Username</h3>
                    <p id="modalUsername" class="text-[13px] text-[#dbdee1] font-medium mb-3">@username</p>
                    <div class="h-[1px] bg-[#2b2d31] mb-3"></div>
                    <div class="mb-4">
                        <p class="text-[10px] font-bold text-white uppercase mb-1">About Me</p>
                        <p id="modalBio" class="text-[13px] text-[#dbdee1] whitespace-pre-line leading-tight">No bio yet...</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-[#2b2d31]">
                        <p class="text-[10px] font-bold text-white uppercase mb-2">Member Since</p>
                        <p id="modalDate" class="text-[12px] text-gray-400">Loading...</p>
                    </div>
                </div>
                <button id="closeModal" class="mt-4 w-full py-2 bg-[#4e5058] hover:bg-[#6d6f78] text-white rounded text-sm font-medium transition">Close</button>
            </div>
        </div>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="https://www.pexels.com/th-th/download/video/34039086/" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script type="module" src="../js/list-profile.js"></script>
</body>
</html>
