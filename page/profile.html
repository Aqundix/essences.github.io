<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Profile Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/profile.css">
    <style>
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader {
            border: 5px solid #f3f3f3; border-top: 5px solid #5865f2;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* สไตล์เพิ่มเติมสำหรับ Preview ใน Modal ให้รองรับ GIF/Image จากเครื่อง */
        .mini-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #5865f2; }
        .mini-banner-preview { 
            width: 100%; height: 80px; border-radius: 8px; 
            background-color: #5865f2; background-size: cover; background-position: center;
            border: 1px solid #444; margin-bottom: 10px;
        }
        .preview-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .upload-actions { display: flex; gap: 10px; }
        .custom-file-upload { cursor: pointer; background: #4f545c; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
        .custom-file-upload input[type="file"] { display: none; }
    </style>
</head>
<body>
    
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loader"></div>
        <p>กำลังบันทึกข้อมูล...</p>
        <p>*ขนาดไฟล์รูปยิ่งใหญ่ ยิ่งโหลดนาน*</p>
    </div>
    
    <div class="container">
        <div class="back-navigation">
            <a href="../index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Member List
            </a>
        </div>

        <div class="profile-card">
            <div class="banner" id="displayBanner"></div>
            
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="../img/profile.jpg" alt="Avatar" id="displayAvatar">
                    <div class="status-dot"></div>
                </div>

                <div class="profile-actions">
                    <button id="editBtn" class="edit-btn" onclick="openModal()" style="display:none;">
                        <i class="fa-solid fa-pen"></i> Edit Profile
                    </button>
                    <button id="resetOwnershipBtn" class="reset-owner-btn" onclick="releaseProfile()" style="display:none;">
                        <i class="fa-solid fa-arrow-rotate-left"></i> Restore Ownership
                    </button>
                </div>
            </div>

            <div class="profile-body">
                <h2 id="displayName">Username</h2>
                <p class="tag" id="displayTag">@0000</p> 
                <hr>
                <div class="section">
                    <h3>About Me</h3>
                    <p id="displayAbout">คลิกปุ่ม Edit เพื่อเริ่มแก้ไขโปรไฟล์ของคุณ...</p>
                </div>
            </div>
        </div>

        <div class="social-card" id="socialCard" style="display: none;">
            <div class="section">
                <h3>Connected Accounts</h3>
                <div id="socialLinks">
                    <div class="social-item" id="itemFB" style="display: none;">
                        <div class="social-left">
                            <i class="fa-brands fa-facebook" style="color: #1877F2;"></i>
                            <span class="social-label">Facebook</span>
                        </div>
                        <a href="#" id="linkFB" target="_blank">Visit Profile</a>
                    </div>
                    <div class="social-item" id="itemIG" style="display: none;">
                        <div class="social-left">
                            <i class="fa-brands fa-instagram" style="color: #E4405F;"></i>
                            <span class="social-label">Instagram</span>
                        </div>
                        <a href="#" id="linkIG" target="_blank">Visit Profile</a>
                    </div>
                    <div class="social-item" id="itemGH" style="display: none;">
                        <div class="social-left">
                            <i class="fa-brands fa-github" style="color: #FFFFFF;"></i>
                            <span class="social-label">GitHub</span>
                        </div>
                        <a href="#" id="linkGH" target="_blank">Visit Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal" style="display: none;">
        <div class="modal-content">
            <h3>Edit Profile & Socials</h3>
            
            <label>Display Name</label>
            <input type="text" id="inputName" maxlength="32" placeholder="ใส่ชื่อของคุณ">
            
            <label>About Me</label>
            <textarea id="inputAbout" rows="3" maxlength="255" oninput="updateCharCount()"></textarea>
            <div id="charCounter" class="char-counter">0 / 255</div>

            <label>Avatar (รูปโปรไฟล์)</label>
            <div class="preview-container">
                <img id="previewAvatar" src="../img/profile.jpg" class="mini-preview">
                <div class="upload-actions">
                    <label class="btn-upload custom-file-upload">
                        <i class="fa-solid fa-camera"></i> เลือกรูปภาพ
                        <input type="file" id="uploadAvatar" accept="image/*" onchange="showPreview(this, 'previewAvatar')">
                    </label>
                    <button type="button" class="btn-remove" onclick="removeImage('previewAvatar', 'avatar')">
                        <i class="fa-solid fa-trash"></i> ลบออก
                    </button>
                </div>
            </div>

            <label>Banner Image (รูปพื้นหลัง / GIF)</label>
            <div class="preview-container">
                <div id="previewBanner" class="mini-banner-preview"></div>
                <div class="upload-actions">
                    <label class="btn-upload custom-file-upload">
                        <i class="fa-solid fa-image"></i> เลือกรูป/GIF
                        <input type="file" id="uploadBanner" accept="image/*" onchange="showPreview(this, 'previewBanner', true)">
                    </label>
                    <button type="button" class="btn-remove" onclick="removeImage('previewBanner', 'banner')">
                        <i class="fa-solid fa-trash"></i> ลบออก
                    </button>
                </div>
            </div>

            <hr style="margin: 20px 0; border: 0.5px solid #3f4147;">

            <label><i class="fa-brands fa-facebook"></i> Facebook URL</label>
            <input type="text" id="inputFB" placeholder="https://www.facebook.com/your-id">

            <label><i class="fa-brands fa-instagram"></i> Instagram URL</label>
            <input type="text" id="inputIG" placeholder="https://www.instagram.com/your-id">

            <label><i class="fa-brands fa-github"></i> GitHub URL</label>
            <input type="text" id="inputGH" placeholder="https://github.com/your-id">

            <div class="modal-actions">
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button type="button" id="mainSaveBtn" class="save-btn" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module" src="../script/profile.js"></script>
</body>
</html>
